# Пример расписания. Скопируйте в config/schedule.yaml и отредактируйте.
# Реальный config/schedule.yaml — в .gitignore.
#
# court_id — Altegio staff_id (в терминах Altegio каждый корт — "мастер").
#   Как получить: см. docs/api-research.md (раздел "Корты / staff_id") или
#   DevTools на b551098.alteg.io → Network → /api/v2/.../bookform/search/staff
#   → поле "staff_id".
#
# service_id — id услуги ("Аренда открытого корта (1 час)" и т.п.).
#   ОТЛИЧАЕТСЯ от staff_id: в Altegio services и staff — разные сущности.
#   Как получить: docs/api-research.md (раздел "Services") или DevTools →
#   /api/v2/.../bookform/services → поле "id". Для "Аренда открытого корта
#   (1 час)" в клубе Daulet: 7849893.
#   В теле POST /records/521176 попадает как "services": [<service_id>].
#
# court_pools (опциональная секция) — группа кортов с одним service_id.
#   Booking с `court_pool: <name>` будет fan-out'иться параллельными
#   запросами на КАЖДЫЙ court в пуле; первый успешный — выигрывает,
#   остальные cancel'ятся. Удобно когда любой свободный корт устраивает.
#   Имя пула: [a-z0-9_-]+. court_ids — non-empty уникальный список int.
#
#   Пример: indoor — все крытые корты, outdoor — открытые, walls — стенки.

court_pools:
  indoor:
    service_id: 7790744          # "Аренда крытого корта (1 час)" — пример
    court_ids: [1513587, 1521553, 1521555, 1521557, 1521558, 1521559, 1521561]
  outdoor:
    service_id: 7849893          # "Аренда открытого корта (1 час)"
    court_ids: [1521564, 1521565, 1521566, 1521567]
  walls:
    service_id: 7854914          # "Аренда стенки (1 час)" — пример
    court_ids: [1529269, 1529270, 1529271]

bookings:
  # Pool-based booking: любой свободный outdoor-корт в пятницу 18:00.
  - name: "Пятница вечер, любой открытый"
    weekday: friday
    slot_local_time: "18:00"
    duration_minutes: 60
    court_pool: outdoor          # XOR с (court_id + service_id) — нельзя оба
    profile: roman
    enabled: true

  # Legacy single-court booking: конкретный корт по id.
  - name: "Воскресенье утро, корт 5"
    weekday: sunday
    slot_local_time: "09:00"
    duration_minutes: 60
    court_id: 0                  # заполнить после Phase 0 (см. docs/api-research.md)
    service_id: 7849893
    profile: roman
    enabled: false
